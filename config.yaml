# Reddit RSS source
reddit:
  subreddit: boardgamedeals
  feed_url: "https://www.reddit.com/r/boardgamedeals/new/.rss"
  max_posts: 50

# Deal verification
verification:
  enabled: true
  max_age_hours: 24
  max_failures: 3
  timeout_seconds: 30
  methods:
    - http_check
    - browser

# HTML generation
html:
  output_dir: "docs"
  template: "templates/index.html.j2"
  title: "Board Game Deals"
  max_deals_shown: 100
  show_expired: false

# Publishing
publish:
  enabled: true
  auto_commit: true
  branch: "main"
  commit_message: "Update deals - {timestamp}"

# Logging
logging:
  file: "logs/bgd.log"
  level: "INFO"
  max_size_mb: 10

# Model selection per step (haiku = cheap, sonnet = mid, opus = full)
models:
  classify: "haiku"
  enrich: "haiku"
  bgg: "haiku"          # stats lookup (factual)
  bgg_ids: "sonnet"     # ID lookup (needs web search + reasoning)
  deep_verify: "sonnet"
  self_heal: ""  # empty = use default (opus)

# BoardGameGeek API (optional — falls back to Claude CLI if not set)
# Register at https://boardgamegeek.com/using_the_xml_api to get a token
bgg:
  api_token: ""

# Self-healing
self_heal:
  enabled: true
  claude_code_path: "claude"
  max_retries: 3
